apiVersion: 1

policies:
  - orgId: 1
    receiver: empty
    group_by:
      - grafana_folder
      - alertname
    group_wait: 5s
    group_interval: 30s
    repeat_interval: 1m
    routes:
      - receiver: email-ikhsan-maulana
        group_by:
          - grafana_folder
          - alertname
        object_matchers:
          - ["__grafana_receiver__", "=", "email-ikhsan-maulana"]
        group_wait: 5s
        group_interval: 30s
        repeat_interval: 1m
