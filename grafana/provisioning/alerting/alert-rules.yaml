apiVersion: 1
groups:
    - orgId: 1
      name: msml-alerts
      folder: MSML
      interval: 10s
      rules:
        - uid: bfovwwy0mojr4b
          title: Model Serving Status - Down
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                editorMode: code
                expr: ml_model_serving_up
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 1
                        type: lt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: NoData
          execErrState: Error
          keepFiringFor: 10s
          annotations:
            description: MLflow model serving tidak dapat dijangkau oleh exporter. Alert aktif ketika exporter mengalami timeout, connection error, atau request exception saat meneruskan request ke model.
            summary: Model Serving Status Down
          isPaused: false
          notification_settings:
            receiver: email-ikhsan-maulana
        - uid: dfovx8cxpunlsb
          title: Request Throughput req/s (1m) - Too High
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                editorMode: code
                expr: sum(rate(ml_prediction_requests_total[1m]))
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 25
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: NoData
          execErrState: Error
          keepFiringFor: 10s
          annotations:
            description: Request throughput melebihi 25 req/s dalam 1 menit terakhir. Ini dapat mengindikasikan lonjakan traffic atau potensi DDoS/spam request.
            summary: Request Throughput req/s terlalu tinggi
          labels:
            app: heart-disease-svc
            instance: prometheus-exporter:8000
            job: heart-diasease-exporter
          isPaused: false
          notification_settings:
            receiver: email-ikhsan-maulana
        - uid: afovxzorpmpkwe
          title: System CPU Usage Percent - High
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                editorMode: code
                expr: ml_cpu_usage_percent
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 80
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: NoData
          execErrState: Error
          keepFiringFor: 10s
          annotations:
            description: CPU usage melebihi 80%. Ini dapat mengindikasikan beban inference tinggi, request abnormal, atau proses lain yang membebani sistem/container environment.
            summary: System CPU Usage Percent tinggi
          isPaused: false
          notification_settings:
            receiver: email-ikhsan-maulana
        - uid: efovy6lr29xj4d
          title: System RAM Usage Percent - High
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                editorMode: code
                expr: ml_memory_usage_percent
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 80
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: NoData
          execErrState: Error
          keepFiringFor: 10s
          annotations:
            description: RAM usage melebihi 80%. Ini dapat mengindikasikan memory pressure, lonjakan request, memory leak, atau proses abnormal pada system/container environment.
            summary: System RAM Usage Percent tinggi
          isPaused: false
          notification_settings:
            receiver: email-ikhsan-maulana
